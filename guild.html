<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mizui Local Leaderboard</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #14001f, #000);
  color: white;
}

.header {
  text-align: center;
  padding: 30px 10px;
}

.header h1 {
  font-size: 34px;
  margin: 0;
  color: #ff66c4;
  text-shadow: 0 0 15px #ff1493;
}

.header p {
  color: #bbb;
}

.container {
  width: 95%;
  max-width: 900px;
  margin: auto;
}

.top1 {
  background: linear-gradient(135deg, #ff1493, #6a0dad);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 0 30px #ff1493;
}

.top1 img {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 10px;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-radius: 12px;
  background: #14001f;
  border-left: 4px solid #ff1493;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.02);
  background: #220033;
}

.rank {
  width: 40px;
  font-weight: bold;
  color: #ccc;
}

.userBox {
  display: flex;
  align-items: center;
  flex: 1;
  gap: 10px;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid #ff1493;
}

.username {
  font-weight: bold;
}

.coins {
  color: #ff66c4;
  font-weight: bold;
}

.first {
  border-left-color: gold;
}

.second {
  border-left-color: silver;
}

.third {
  border-left-color: #cd7f32;
}

.serverBox {
  margin-top: 15px;
  text-align: center;
  color: #999;
  font-size: 14px;
}

.error {
  text-align: center;
  margin-top: 30px;
  color: #ff5c5c;
  font-size: 18px;
}

</style>
</head>

<body>

<div class="header">
  <h1>🏰 Mizui Local Leaderboard</h1>
  <p>Top 15 jogadores mais ricos deste servidor</p>

  <div class="serverBox">
    Servidor ID:
    <span id="guildIdText">Carregando...</span>
  </div>
</div>

<div class="container">
  <div id="top1"></div>
  <div id="list" class="list"></div>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const guildId = params.get("guild");

document.getElementById("guildIdText").innerText =
  guildId || "Desconhecido";

async function load() {

  try {

    if (!guildId) {
      document.getElementById("list").innerHTML =
        `<div class="error">❌ Guild ID não informado.</div>`;
      return;
    }

    const url =
      `http://127.0.0.1:3000/leaderboard/${guildId}`;

    const res = await fetch(url);

    const data = await res.json();

    if (!data.length) {

      document.getElementById("list").innerHTML =
        `<div class="error">
          ❌ Esse servidor ainda não possui ranking.
        </div>`;

      return;
    }

    const top1 = data[0];

    document.getElementById("top1").innerHTML = `
      <div class="top1">

        <img src="${
          top1.avatar ||
          "https://cdn.discordapp.com/embed/avatars/0.png"
        }" />

        <h2>👑 TOP 1</h2>

        <p>
          <b>${top1.name}</b>
        </p>

        <p>
          ${top1.coins} mzcoins
        </p>

      </div>
    `;

    const list = data.map(u => {

      let rankClass = "";

      if (u.position === 1) rankClass = "first";
      if (u.position === 2) rankClass = "second";
      if (u.position === 3) rankClass = "third";

      return `

        <div class="item ${rankClass}">

          <div class="rank">
            #${u.position}
          </div>

          <div class="userBox">

            <img
              class="avatar"
              src="${
                u.avatar ||
                "https://cdn.discordapp.com/embed/avatars/0.png"
              }"
            />

            <div class="username">
              ${u.name}
            </div>

          </div>

          <div class="coins">
            ${u.coins}
          </div>

        </div>

      `;
    }).join("");

    document.getElementById("list").innerHTML = list;

  } catch (err) {

    console.log(err);

    document.getElementById("list").innerHTML =
      `<div class="error">
        ❌ Erro ao carregar leaderboard
      </div>`;
  }
}

load();

setInterval(load, 5000);

</script>

</body>
</html>
