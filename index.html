<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mizui Leaderboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a0025, #000);
  color: white;
}

.header {
  text-align: center;
  padding: 30px 10px;
}

.header h1 {
  font-size: 34px;
  margin: 0;
  color: #c77dff;
  text-shadow: 0 0 10px #7b2cbf;
}

.header p {
  color: #aaa;
}

.container {
  width: 95%;
  max-width: 900px;
  margin: auto;
}

.top1 {
  background: linear-gradient(135deg, #7b2cbf, #3c096c);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 0 25px #7b2cbf;
}

.top1 img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 10px;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-radius: 10px;
  background: #12001f;
  border-left: 4px solid #7b2cbf;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.02);
  background: #1a0033;
}

.rank {
  width: 40px;
  font-weight: bold;
  color: #aaa;
}

.userBox {
  display: flex;
  align-items: center;
  flex: 1;
  gap: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #7b2cbf;
}

.username {
  font-weight: bold;
}

.coins {
  color: #c77dff;
  font-weight: bold;
}

.first { border-left-color: gold; }
.second { border-left-color: silver; }
.third { border-left-color: #cd7f32; }

</style>
</head>

<body>

<div class="header">
  <h1>🏆 Mizui Leaderboard</h1>
  <p>Top 15 jogadores mais ricos</p>
</div>

<div class="container">
  <div id="top1"></div>
  <div id="list" class="list"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const guildId = params.get("guild");

// escolhe rota automaticamente
const url = guildId
  ? `http://127.0.0.1:3000/leaderboard/${guildId}`
  : `http://127.0.0.1:3000/leaderboard`;

async function load() {
  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!data.length) {
      document.getElementById("list").innerHTML =
        "Sem dados ainda.";
      return;
    }

    const top1 = data[0];

    document.getElementById("top1").innerHTML = `
      <div class="top1">
        <img src="${top1.avatar || 'https://i.imgur.com/placeholder.png'}" />
        <h2>👑 TOP 1</h2>
        <p><b>${top1.name}</b></p>
        <p>${top1.coins} mzcoins</p>
      </div>
    `;

    const list = data.map(u => {
      let rankClass = "";
      if (u.position === 1) rankClass = "first";
      if (u.position === 2) rankClass = "second";
      if (u.position === 3) rankClass = "third";

      return `
        <div class="item ${rankClass}">
          <div class="rank">#${u.position}</div>

          <div class="userBox">
            <img class="avatar" src="${u.avatar}" />
            <div class="username">${u.name}</div>
          </div>

          <div class="coins">${u.coins}</div>
        </div>
      `;
    }).join("");

    document.getElementById("list").innerHTML = list;

  } catch (err) {
    console.log(err);
    document.getElementById("list").innerHTML =
      "❌ Erro ao carregar leaderboard";
  }
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
